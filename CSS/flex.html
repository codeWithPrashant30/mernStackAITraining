<!DOCTYPE html>
<html>
<head>
  <style>
    .container {
      display: flex;
      border: 2px solid black;
    }

    .box {
      height: 100px;
      color: white;
      font-size: 20px;
      text-align: center;
      line-height: 100px;
      margin: 5px;
    }

    .box1 {
      background: red;
      flex-basis: 100px;
    }

    .box2 {
      background: blue;
      flex-basis: 200px;
    }

    .box3 {
      background: green;
      flex-basis: 300px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="box box1">100px</div>
  <div class="box box2">200px</div>
  <div class="box box3">300px</div>
</div>

</body>
</html>
